<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="title desc">
  <title id="title">my-pi System Architecture</title>
  <desc id="desc">Four connected layers: user and pi TUI, extensions, agents, and infrastructure.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e7681"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="12" fill="#0d1117"/>
  <text x="600" y="42" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="22" font-weight="bold">System Architecture</text>
  <text x="600" y="67" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12">Four connected layers in the my-pi working environment</text>

  <line x1="600" y1="190" x2="600" y2="215" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="320" x2="600" y2="345" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="450" x2="600" y2="475" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="100" y="90" width="1000" height="100" rx="14" fill="#58a6ff" fill-opacity="0.10" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="126" y="115" width="50" height="50" rx="12" fill="#58a6ff" fill-opacity="0.18" stroke="#58a6ff"/>
    <text x="151" y="147" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="18" font-weight="bold">1</text>
    <text x="204" y="128" fill="#e6edf3" font-family="monospace" font-size="17" font-weight="bold">User / pi TUI</text>
    <text x="204" y="155" fill="#8b949e" font-family="monospace" font-size="13">Interactive terminal for sessions, prompts, shortcuts, and tool output</text>
    <text x="1040" y="128" text-anchor="end" fill="#58a6ff" font-family="monospace" font-size="12">Terminal UI</text>
    <text x="1040" y="153" text-anchor="end" fill="#8b949e" font-family="monospace" font-size="11">sessions · context · keybindings</text>
  </g>

  <g>
    <rect x="100" y="220" width="1000" height="100" rx="14" fill="#d2a8ff" fill-opacity="0.09" stroke="#d2a8ff" stroke-width="1.5"/>
    <rect x="126" y="245" width="50" height="50" rx="12" fill="#d2a8ff" fill-opacity="0.16" stroke="#d2a8ff"/>
    <text x="151" y="277" text-anchor="middle" fill="#d2a8ff" font-family="monospace" font-size="18" font-weight="bold">2</text>
    <text x="204" y="258" fill="#e6edf3" font-family="monospace" font-size="17" font-weight="bold">Extensions</text>
    <text x="204" y="285" fill="#8b949e" font-family="monospace" font-size="13">Local TypeScript extensions and packages add tools, commands, and UI</text>
    <text x="1040" y="258" text-anchor="end" fill="#d2a8ff" font-family="monospace" font-size="12">Local + packaged</text>
    <text x="1040" y="283" text-anchor="end" fill="#8b949e" font-family="monospace" font-size="11">tools · workflows · rendering</text>
  </g>

  <g>
    <rect x="100" y="350" width="1000" height="100" rx="14" fill="#3fb950" fill-opacity="0.09" stroke="#3fb950" stroke-width="1.5"/>
    <rect x="126" y="375" width="50" height="50" rx="12" fill="#3fb950" fill-opacity="0.16" stroke="#3fb950"/>
    <text x="151" y="407" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="18" font-weight="bold">3</text>
    <text x="204" y="388" fill="#e6edf3" font-family="monospace" font-size="17" font-weight="bold">Agents</text>
    <text x="204" y="415" fill="#8b949e" font-family="monospace" font-size="13">Nine specialized roles for implementation, review, research, and verification</text>
    <text x="1040" y="388" text-anchor="end" fill="#3fb950" font-family="monospace" font-size="12">9 specialized roles</text>
    <text x="1040" y="413" text-anchor="end" fill="#8b949e" font-family="monospace" font-size="11">OpenAI · Anthropic</text>
  </g>

  <g>
    <rect x="100" y="480" width="1000" height="100" rx="14" fill="#f0883e" fill-opacity="0.09" stroke="#f0883e" stroke-width="1.5"/>
    <rect x="126" y="505" width="50" height="50" rx="12" fill="#f0883e" fill-opacity="0.16" stroke="#f0883e"/>
    <text x="151" y="537" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="18" font-weight="bold">4</text>
    <text x="204" y="518" fill="#e6edf3" font-family="monospace" font-size="17" font-weight="bold">Infrastructure</text>
    <text x="204" y="545" fill="#8b949e" font-family="monospace" font-size="13">Claude MCP bridge reuses service integrations from Claude Code</text>
    <text x="1040" y="518" text-anchor="end" fill="#f0883e" font-family="monospace" font-size="12">MCP integrations</text>
    <text x="1040" y="543" text-anchor="end" fill="#8b949e" font-family="monospace" font-size="11">Jira · Slack · Gmail · Calendar · GA4 · BigQuery</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#6e7681" font-family="monospace" font-size="11">interaction → extension runtime → delegated roles → connected services</text>
</svg>
